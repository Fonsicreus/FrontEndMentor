<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./scripts.js" defer></script>

    <title>Frontend Mentor | Time tracking dashboard</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="container-name">
        <div class="user-info">
          <img src="./images/image-jeremy.png" alt="Jeremy Robson" />
          <div class="user-text">
            <p class="report-for">Report for</p>
            <h1 class="name">Jeremy Robson</h1>
          </div>
        </div>
        <div class="timeframe">
          <p>Daily</p>
          <p>Weekly</p>
          <p>Monthly</p>
        </div>
      </div>

      <div class="container-activities">
        <div class="activity-card work">
          <div class="activity">
            <div class="activity-header">Work</div>
            <div class="activity-stats">
              <div class="activity-time">--hrs</div>
              <div class="activity-previous">Last Week - --hrs</div>
            </div>
          </div>
        </div>

        <div class="activity-card play">
          <div class="activity">
            <div class="activity-header">Play</div>
            <div class="activity-stats">
              <div class="activity-time">--hrs</div>
              <div class="activity-previous">Last Week - --hrs</div>
            </div>
          </div>
        </div>

        <div class="activity-card study">
          <div class="activity">
            <div class="activity-header">Study</div>
            <div class="activity-stats">
              <div class="activity-time">--hrs</div>
              <div class="activity-previous">Last Week - --hrs</div>
            </div>
          </div>
        </div>

        <div class="activity-card exercise">
          <div class="activity">
            <div class="activity-header">Exercise</div>
            <div class="activity-stats">
              <div class="activity-time">--hrs</div>
              <div class="activity-previous">Last Week - --hrs</div>
            </div>
          </div>
        </div>

        <div class="activity-card social">
          <div class="activity">
            <div class="activity-header">Social</div>
            <div class="activity-stats">
              <div class="activity-time">--hrs</div>
              <div class="activity-previous">Last Week - --hrs</div>
            </div>
          </div>
        </div>

        <div class="activity-card self-care">
          <div class="activity">
            <div class="activity-header">Self Care</div>
            <div class="activity-stats">
              <div class="activity-time">--hrs</div>
              <div class="activity-previous">Last Week - --hrs</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="attribution" style="padding-top: 20px; color: salmon">
      Challenge by <a style="color: aquamarine" href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a style="color: aquamarine" href="https://github.com/Fonsicreus">Satella</a>.
    </footer>
  </body>
</html>
